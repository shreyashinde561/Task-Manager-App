


<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body.dark {
  background: radial-gradient(circle at top left,#4facfe,#0f2027);
  color: white;
}

body.light {
  background: #f4f6fb;
  color: #111;
}

body.light .sidebar {
  background: #ffffff;
  color: black;
}

body.light .card {
  background: #ffffff;
  color: black;
}

body.light a {
  color: #333;
}
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  background: radial-gradient(circle at top left, #4facfe, #0f2027);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* PROFILE CARD */
.container{
  width:420px;
  max-width:90%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  padding:35px 30px;
  border-radius:22px;
  box-shadow:0 0 30px rgba(0,0,0,0.35);
  text-align:center;
  animation:fadeIn 0.8s ease;
}

/* AVATAR */
.avatar,
.profile-pic{
  width:130px;
  height:130px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.7);
  margin-bottom:15px;
  box-shadow:0 0 20px rgba(79,172,254,0.8);
  transition:0.3s;
}

.profile-pic{
  object-fit:cover;
}

.avatar{
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:55px;
  font-weight:bold;
}

.avatar:hover,
.profile-pic:hover{
  transform:scale(1.05);
}

/* TEXT */
h2{
  margin-top:10px;
  margin-bottom:4px;
  font-weight:600;
}

p{
  margin-bottom:10px;
  opacity:0.9;
}

/* ACTION BUTTONS */
.actions a{
  display:block;
  padding:14px;
  margin-top:12px;
  border-radius:14px;
  text-decoration:none;
  font-weight:500;
  background: rgba(255,255,255,0.15);
  color:#00f2fe;
  transition:0.3s;
}

.actions a:hover{
  background: linear-gradient(135deg,#4facfe,#00f2fe);
  color:black;
  transform:translateY(-2px);
  box-shadow:0 8px 20px rgba(79,172,254,0.6);
}

/* BACK BUTTON */
.back-btn{
  display:inline-block;
  margin-top:18px;
  text-decoration:none;
  color:#fff;
  opacity:0.8;
}

.back-btn:hover{
  text-decoration:underline;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body class="{{ session.get('theme','dark') }}">
<div class="container">

{% if user.profile_pic %}
<img src="{{ url_for('static', filename='profile_pics/' ~ user.profile_pic) }}" class="profile-pic">
{% else %}
<div class="avatar">{{ user.username[0]|upper }}</div>
{% endif %}

<h2>{{ user.username }}</h2>
<p>{{ user.email }}</p>

<p>
  Logout Permission:
  {% if can_logout == 1 %}
    <span style="color:#00ff9d; font-weight:600;">Allowed</span>
  {% else %}
    <span style="color:#ff6b6b; font-weight:600;">Blocked</span>
  {% endif %}
</p>

<div class="actions">
  <a href="/edit_profile">✏ Edit Profile</a>
  <a href="/delete_profile_pic">🗑 Delete Profile Picture</a>
  <a href="/delete_account" onclick="return confirm('Delete account?')">❌ Delete Account</a>
</div>

<a href="{{ url_for('dashboard') }}" class="back-btn">⬅ Back to Dashboard</a>

</div>

</body>
</html>
