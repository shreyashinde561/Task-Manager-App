<!DOCTYPE html>
<html>
<head>
<title>Admin Private Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body.dark {
  background: radial-gradient(circle at top left,#4facfe,#0f2027);
  color: white;
}

body.light {
  background: #f4f6fb;
  color: #111;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  background:radial-gradient(circle at top left,#4facfe,#0f2027);
  color:#fff;
}

/* Topbar */
.topbar{
  height:60px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 25px;
}

.topbar a{
  text-decoration:none;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:black;
  padding:8px 18px;
  border-radius:20px;
  font-weight:600;
}

/* Layout */
.container{
  display:flex;
  height:calc(100vh - 60px);
}

/* User List */
.users{
  width:25%;
  background:rgba(255,255,255,0.12);
  padding:15px;
  overflow-y:auto;
}

.user{
  padding:10px;
  background:rgba(255,255,255,0.15);
  margin-bottom:8px;
  border-radius:12px;
}

.user a{
  color:white;
  text-decoration:none;
  display:block;
}

/* Chat Area */
.chat{
  flex:1;
  padding:20px;
  display:flex;
  flex-direction:column;
}

.messages{
  flex:1;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:5px;
}

/* Message Bubble */
.msg{
  max-width:70%;
  padding:8px 12px;
  border-radius:15px;
  word-wrap:break-word;
}

/* User vs Admin */
.msg-user{
  background:rgba(255,255,255,0.15);
  align-self:flex-start;
}

.msg-admin{
  background:#34ffd2;
  color:#111;
  align-self:flex-end;
}

/* Timestamp */
.msg-time{
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
  text-align:right;
}

/* Input */
form{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  border-radius:30px;
  border:none;
  padding:10px 15px;
  outline:none;
}

button{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  border:none;
  border-radius:30px;
  padding:10px 22px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>
<body>

<div class="topbar">
<span>Admin Private Chat</span>
<a href="{{ url_for('dashboard') }}">⬅ Back</a>
</div>

<div class="container">

<div class="users">
<h3>Users</h3>
{% for u in users %}
<div class="user">
<a href="/admin_private_chat/{{ u[0] }}">{{ u[1] }}</a>
</div>
{% endfor %}
</div>

<div class="chat">
  <div class="messages">

    {% for id,msg,sender,time,username in chats %}
    <div class="msg {% if sender=='admin' %}msg-admin{% else %}msg-user{% endif %}">
      <b>{{ username if sender=='user' else 'Admin' }}:</b> {{ msg }}
      <div class="msg-time">
        {{ time.strftime('%I:%M %p | %d %b %Y') }}
      </div>
    </div>
    {% endfor %}

  </div>

  {% if chats %}
  <form method="post">
    <input type="text" name="message" placeholder="Reply..." required>
    <button type="submit">Send</button>
  </form>
  {% endif %}
</div>

</div>
</body>
</html>
