

<!DOCTYPE html>
<html>
<head>
<title>All Tasks</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body.dark{
background: radial-gradient(circle at top left,#4facfe,#0f2027);
color:white;
}

body.light{
background:#f4f6fb;
color:#111;
}

body{
font-family:Poppins;
padding:40px;
min-height:100vh;
}

h2{
margin-bottom:30px;
text-align:center;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.ticket{

background: rgba(255,255,255,0.12);
backdrop-filter: blur(12px);
padding:20px;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.25);
transition:0.3s;

}

.ticket:hover{

transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.35);

}

.ticket h3{
margin-bottom:10px;
font-weight:600;
}

.ticket p{
margin:6px 0;
font-size:14px;
}

.btn{

margin-top:12px;
padding:10px 18px;
background: linear-gradient(135deg,#4facfe,#00f2fe);
color:black;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:0.3s;

}

.btn:hover{

transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.3);

}

</style>

</head>

<body class="{{ session.get('theme','dark') }}">

<h2>All Tasks</h2>

<div class="container">

{% for task in tasks %}

<div class="ticket">

<h3>{{task.task_title}}</h3>

<p><b>Assigned To:</b> {{task.assigned_to}}</p>

<p><b>Status:</b> {{task.status}}</p>

<p><b>Deadline:</b> {{task.deadline}}</p>

<a href="{{ url_for('task_details', id=task.id) }}">
<button class="btn">View Details</button>
</a>

</div>

{% endfor %}

</div>

</body>
</html>
