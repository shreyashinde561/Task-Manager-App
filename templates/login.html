<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1c2b4a, #0f172a);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }

    .stars {
      position: fixed;
      width: 200%;
      height: 200%;
      background: transparent url("https://www.transparenttextures.com/patterns/stardust.png") repeat;
      animation: moveStars 80s linear infinite;
      z-index: 0;
    }

    @keyframes moveStars {
      from { transform: translateY(0); }
      to { transform: translateY(-1000px); }
    }

    .top-nav{
      position: fixed;
      top:0;
      left:0;
      width:100%;
      padding:15px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(15px);
      z-index: 2;
    }

    .nav-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    .nav-logo{
      width:40px;
    }

    .brand-name{
      font-size:20px;
      font-weight:600;
      color:white;
    }

    .nav-right a{
      margin-left:25px;
      color:#34ffd2;
      text-decoration:none;
      font-weight:500;
      transition:0.3s;
    }

    .nav-right a:hover{
      color:white;
      text-shadow:0 0 8px #34ffd2;
    }

    .login-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 1;
      margin-top:60px;
    }

    .logo {
      width: 110px;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 15px #4da6ff);
    }

    .glass-card {
      width: 400px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border-radius: 25px;
      padding: 40px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      text-align: center;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(20px);}
      to{opacity:1; transform:translateY(0);}
    }

    h3 {
      margin-bottom: 25px;
    }

    .form-control {
      border-radius: 20px;
      border: none;
      padding: 12px 18px;
      margin-bottom: 15px;
    }

    .password-wrapper {
      position: relative;
    }

    .show-btn {
      position: absolute;
      right: 15px;
      top: 12px;
      cursor: pointer;
      color: #555;
      font-size: 16px;
    }

    .btn-primary {
      border-radius: 25px;
      padding: 12px;
      background: linear-gradient(135deg,#2563eb,#1d4ed8);
      border: none;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg,#1d4ed8,#2563eb);
      box-shadow:0 0 15px rgba(37,99,235,0.6);
    }

    a {
      color: #34ffd2;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .spinner {
      display: none;
      margin-top: 15px;
    }

    .error-msg {
      color: #ff6b6b;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<nav class="top-nav">
  <div class="nav-left">
    <img src="{{ url_for('static', filename='logo.png') }}" class="nav-logo">
    <span class="brand-name">Task Manager App</span>
  </div>

  <div class="nav-right">
    <a href="/about">About Us</a>
    <a href="/contact">Contact</a>
  </div>
</nav>

<div class="stars"></div>

<div class="login-wrapper">

  <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

  <div class="glass-card">

    <h3>Task Manager App Login</h3>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

      <form method="POST" action="/login" onsubmit="showSpinner()">

        <input type="email" name="email" class="form-control" placeholder="Email" required>

      <div class="password-wrapper">
        <input type="password" id="password" name="password" class="form-control" placeholder="Password" required>
        <span class="show-btn" onclick="togglePassword()" id="toggleIcon">👁️</span>
      </div>

      <!-- ⭐ ADDED DROPDOWN -->
      <select name="login_type" class="form-control">
        <option value="user">Login as User</option>
        <option value="admin">Login as Admin</option>
      </select>

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="spinner" id="spinner">
      <div class="spinner-border text-light"></div>
      <p>Logging in...</p>
    </div>

    <div class="mt-3">
      <a href="/register">Create new account</a>
    </div>

  </div>
</div>

<script>
  function togglePassword() {
    const pass = document.getElementById("password");
    const icon = document.getElementById("toggleIcon");

    if (pass.type === "password") {
      pass.type = "text";
      icon.innerText = "🙈";
    } else {
      pass.type = "password";
      icon.innerText = "👁️";
    }
  }

  function showSpinner() {
    document.getElementById("spinner").style.display = "block";
  }
</script>

</body>
</html>
