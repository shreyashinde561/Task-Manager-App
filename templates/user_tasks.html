

<!DOCTYPE html>
<html>
<head>
<title>My Tasks</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Poppins',sans-serif;
    background: radial-gradient(circle at top left,#4facfe,#0f2027);
    color:white;
    margin:0;
    padding:40px;
}

h2{
    text-align:center;
    margin-bottom:40px;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.ticket{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    padding:20px;
    border-radius:18px;
    box-shadow:0 6px 20px rgba(0,0,0,0.25);
    transition:0.3s;
}

.ticket:hover{
    transform:translateY(-5px);
}

.ticket h3{
    margin-bottom:10px;
}

.ticket p{
    font-size:14px;
    margin:6px 0;
}

.status{
    display:inline-block;
    padding:5px 12px;
    border-radius:10px;
    font-size:12px;
    font-weight:600;
}

.pending{
    background:#ffb347;
    color:black;
}

.completed{
    background:#00e676;
    color:black;
}

.deadline{
    font-size:13px;
    opacity:0.8;
}

.buttons{
    margin-top:15px;
}

button{
    padding:8px 14px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:600;
    margin-right:8px;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
}

button:hover{
    transform:scale(1.05);
}

</style>
</head>

<body>

<h2>My Task Tickets</h2>

<div class="container">

{% for task in tasks %}

<div class="ticket">

<h3>{{ task.task_title }}</h3>

<p>{{ task.task_description }}</p>

<p class="deadline">Deadline: {{ task.deadline }}</p>

<p>
Status:
<span class="status 
{% if task.status == 'Completed' %}
completed
{% else %}
pending
{% endif %}
">
{{ task.status }}
</span>
</p>

<div class="buttons">

<a href="/task/{{task.id}}">
<button>View Details</button>
</a>

{% if task.status != "Completed" %}
<a href="/complete_task/{{task.id}}">
<button>Mark Complete</button>
</a>
{% endif %}

</div>

</div>

{% endfor %}

</div>

</body>
</html>
