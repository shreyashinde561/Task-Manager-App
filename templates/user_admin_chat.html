<!DOCTYPE html>
<html>
<head>
<title>Chat with Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body.dark {
  background: radial-gradient(circle at top left,#4facfe,#0f2027);
  color: white;
}

body.light {
  background: #f4f6fb;
  color: #111;
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body {
  min-height:100vh;
  background:radial-gradient(circle at top left,#4facfe,#0f2027);
  color:#fff;
  display:flex;
  flex-direction:column;
}

/* Topbar */
.topbar{
  height:60px;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 25px;
}

.back-btn{
  text-decoration:none;
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  color:black;
  padding:8px 18px;
  border-radius:20px;
  font-weight:600;
}

/* Chat Card */
.chat-card{
  width:700px;
  max-width:95%;
  height:500px;
  margin:30px auto;
  display:flex;
  flex-direction:column;
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  color:white;
  box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* Messages Box */
.messages-box{
  flex:1;
  overflow-y:auto;
  margin-bottom:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-right:5px;
}

/* Message */
.msg{
  max-width:70%;
  padding:8px 12px;
  border-radius:15px;
  word-wrap:break-word;
}

/* User vs Admin */
.msg-user{
  background:rgba(255,255,255,0.15);
  align-self:flex-start;
}

.msg-admin{
  background:#34ffd2;
  color:#111;
  align-self:flex-end;
}

.msg-time{
  font-size:11px;
  opacity:0.7;
  margin-top:4px;
  text-align:right;
}

/* Input */
.send-row{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  border-radius:30px;
  border:none;
  padding:10px 15px;
  outline:none;
}

button{
  background:linear-gradient(135deg,#4facfe,#00f2fe);
  border:none;
  border-radius:30px;
  padding:10px 22px;
  cursor:pointer;
  font-weight:600;
}
</style>
</head>
<body>

<div class="topbar">
<span>Chat with Admin</span>
<a href="/dashboard" class="back-btn">⬅ Back</a>
</div>

<div class="chat-card">
  <div class="messages-box">

    {% for id,msg,sender,time in chats %}
    <div class="msg {% if sender=='admin' %}msg-admin{% else %}msg-user{% endif %}">
      <b>{{ sender }}:</b> {{ msg }}
      <div class="msg-time">
        {{ time.strftime('%I:%M %p | %d %b %Y') }}
      </div>
    </div>
    {% endfor %}

  </div>

<form method="post" class="send-row">
<input type="text" name="message" placeholder="Type your message..." required>
<button type="submit">Send</button>
</form>
</div>

</body>
</html>
